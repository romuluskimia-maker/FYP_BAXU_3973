{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Review Generated Questions</h2>
    <p>Document: <strong>{{ doc.filename }}</strong></p>
    <p class="text-muted">Please review each question and provide feedback before publishing.</p>
    
    <form method="POST" action="{{ url_for('tune_questions') }}">
        {% for question in questions %}
        <div class="card mb-3">
            <div class="card-header">
                <strong>Question {{ loop.index }}</strong>
                <span class="badge bg-warning">Pending Review</span>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label>Question Text:</label>
                    <textarea name="question_text_{{ question.id }}" class="form-control" rows="2">{{ question.question_text }}</textarea>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <label>A) <input type="text" name="option_a_{{ question.id }}" class="form-control" value="{{ question.option_a }}"></label>
                    </div>
                    <div class="col-md-6">
                        <label>B) <input type="text" name="option_b_{{ question.id }}" class="form-control" value="{{ question.option_b }}"></label>
                    </div>
                    <div class="col-md-6 mt-2">
                        <label>C) <input type="text" name="option_c_{{ question.id }}" class="form-control" value="{{ question.option_c }}"></label>
                    </div>
                    <div class="col-md-6 mt-2">
                        <label>D) <input type="text" name="option_d_{{ question.id }}" class="form-control" value="{{ question.option_d }}"></label>
                    </div>
                </div>
                
                <div class="row mt-3">
                    <div class="col-md-4">
                        <label>Correct Answer:</label>
                        <select name="correct_answer_{{ question.id }}" class="form-control">
                            <option value="A" {% if question.correct_answer == 'A' %}selected{% endif %}>A</option>
                            <option value="B" {% if question.correct_answer == 'B' %}selected{% endif %}>B</option>
                            <option value="C" {% if question.correct_answer == 'C' %}selected{% endif %}>C</option>
                            <option value="D" {% if question.correct_answer == 'D' %}selected{% endif %}>D</option>
                        </select>
                    </div>
                    <div class="col-md-8">
                        <label>Explanation:</label>
                        <textarea name="explanation_{{ question.id }}" class="form-control" rows="2">{{ question.explanation }}</textarea>
                    </div>
                </div>
                
                <div class="mt-3">
                    <label>Teacher's Feedback/Notes:</label>
                    <textarea name="teacher_notes_{{ question.id }}" class="form-control" rows="2" placeholder="Any issues with this question?"></textarea>
                </div>
                
                <div class="mt-3">
                    <label>Status:</label>
                    <select name="status_{{ question.id }}" class="form-control">
                        <option value="pending">Pending Review</option>
                        <option value="approved">Approve</option>
                        <option value="rejected">Reject (Needs Regeneration)</option>
                        <option value="modified">Modified (Changes Made)</option>
                    </select>
                </div>
            </div>
        </div>
        {% endfor %}
        
        <div class="text-center">
            <button type="submit" name="action" value="save_changes" class="btn btn-primary">Save Changes & Continue</button>
            <button type="submit" name="action" value="approve_all" class="btn btn-success">Approve All & Publish</button>
        </div>
    </form>
</div>
{% endblock %}

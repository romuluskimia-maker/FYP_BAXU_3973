<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - EduLearn</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 500px; margin: 50px auto;">
            <h1 style="text-align: center;">👨‍🎓 Student Login</h1>
            
            {% if error %}
            <div class="alert alert-warning">
                {{ error }}
            </div>
            {% endif %}
            
            <form action="{{ url_for('student_login') }}" method="post">
                <div class="form-group">
                    <label for="student_id">Student ID</label>
                    <input type="text" id="student_id" name="student_id" class="form-control" placeholder="e.g., 2024001" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn" style="width: 100%;">Login as Student</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px; color: #666;">
                Not a student? <a href="{{ url_for('teacher_login') }}" style="color: #667eea;">Login as Teacher</a>
            </p>
            <p style="text-align: center; color: #666;">
                <a href="{{ url_for('index') }}" style="color: #667eea;">← Back to Home</a>
            </p>
        </div>
    </div>
</body>
</html>
